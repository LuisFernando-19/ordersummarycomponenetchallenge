<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<title>Order Summary Component</title>
	</head>
	<body>
		<main>
			<svg
				aria-hidden="true"
				xmlns="http://www.w3.org/2000/svg"
				width="1440"
				viewBox="0 0 1440 428"
				fill="none"
			>
				<path
					fill-rule="evenodd"
					clip-rule="evenodd"
					d="M0 349.974C0 349.974 327.837 524.026 724.475 349.974C1121.11 175.921 1440 349.974 1440 349.974V0H0V349.974Z"
					fill="#D6E1FF"
				/>
			</svg>

			<article>
				<div class="main_card_container">
					<img aria-hidden="true" src="./Assets/illustration.svg" alt="" />
					<div class="main_order_container">
						<div class="order_details_container">
							<div class="summary_container">
								<h1>Order Summary</h1>
								<p>
									You can now listen to millions of songs, audiobooks, and
									podcasts on any device anywhere you like!
								</p>
							</div>
							<div class="plan_summary_container">
								<div class="plan_details">
									<div class="plan_text">
										<div class="musuicplan_container">
											<img src="./Assets/musicicon.svg" alt="" />
										</div>
										<dl class="plan_cost">
											<dt>Annual Plan</dt>
											<dd>$59.99/year</dd>
										</dl>
									</div>
									<button aria-label="Change plan" class="change_plan_button">
										Change
									</button>
								</div>
							</div>
						</div>
						<div class="payment_buttons_container">
							<button class="proceed_button">Proceed to Payment</button>
							<a class="cancel_button" href="">Cancel Order</a>
						</div>
					</div>
				</div>
			</article>
		</main>
	</body>
</html>
